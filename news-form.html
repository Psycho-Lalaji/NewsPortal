<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Editor - Create News</title>
    <link rel="stylesheet" href="news-form.css">
</head>
<body>

<header>
    <h1>Create News</h1>
    <div class="logout">
        <a href="dashboard.php">Back</a>
    </div>
</header>

<main>
    <div class="dashboard-container">
        <h2> News Item</h2>

        <form enctype="multipart/form-data">
            <!-- Title -->
            <input type="text" placeholder="News Title" required>

            <!-- Short description -->
            <textarea placeholder="Short description / summary"></textarea>

            <!-- Category -->
            <select required>
                <option value="">Select Category</option>
                <option>Politics</option>
                <option>Sports</option>
                <option>Technology</option>
                <option>Entertainment</option>
            </select>

            <!-- Upload media -->
            <label>Upload Image / Video:</label>
            <input type="file" accept="image/*,video/*">

            <!-- Author (optional) -->
            <input type="text" placeholder="Author Name (optional)">

            <!-- Submit -->
            <button type="submit">Submit for Approval</button>
        </form>
    </div>
</main>

</body>
</html>
